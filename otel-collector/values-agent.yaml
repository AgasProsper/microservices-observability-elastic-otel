mode: daemonset
namespaceOverride: default

image:
  repository: "otel/opentelemetry-collector-contrib"
  tag: "0.93.0"

extraEnvs:
  - name: K8S_NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: ${env:MY_POD_IP}:4317
        http:
          endpoint: ${env:MY_POD_IP}:4318
    zipkin:
      endpoint: 0.0.0.0:9411
    hostmetrics:
      collection_interval: 10s
      scrapers:
        cpu:
        diskio:
        filesystem:
        load:
        memory:
        network:

  processors:
    batch:
      send_batch_size: 1000
      timeout: 10s
    memory_limiter:
      check_interval: 1s
      limit_percentage: 75
      spike_limit_percentage: 15
    resourcedetection:
      detectors: [env, system]
      timeout: 2s
    k8sattributes:
      auth_type: "serviceAccount"
      passthrough: false
      extract:
        metadata:
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.deployment.name
          - k8s.namespace.name
          - k8s.node.name
          - k8s.pod.start_time
      pod_association:
        - sources:
          - from: resource_attribute
            name: k8s.pod.ip
        - sources:
          - from: connection

  exporters:
    otlp/gateway:
      endpoint: "opentelemetry-collector-gateway.default.svc.cluster.local:4317"
      tls:
        insecure: true
    logging:
      verbosity: info

  service:
    pipelines:
      traces:
        receivers: [otlp, zipkin]
        processors: [memory_limiter, resourcedetection, k8sattributes, batch]
        exporters: [otlp/gateway, logging]
      metrics:
        receivers: [otlp, hostmetrics]
        processors: [memory_limiter, resourcedetection, k8sattributes, batch]
        exporters: [otlp/gateway, logging]
      logs:
        receivers: [otlp]
        processors: [memory_limiter, resourcedetection, k8sattributes, batch]
        exporters: [otlp/gateway, logging]
