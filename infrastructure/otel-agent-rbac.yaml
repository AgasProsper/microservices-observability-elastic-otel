apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-agent-metadata-reader
rules:
- apiGroups: [""]
  resources: ["pods", "namespaces", "nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["replicasets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-agent-metadata-reader-binding
subjects:
- kind: ServiceAccount
  name: otel-agent-opentelemetry-collector
  namespace: default
roleRef:
  kind: ClusterRole
  name: otel-agent-metadata-reader
  apiGroup: rbac.authorization.k8s.io
