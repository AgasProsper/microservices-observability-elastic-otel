# NGINX Ingress Metricbeat module config
# Monitors active connections, request rate, response codes
apiVersion: v1
kind: ConfigMap
metadata:
  name: metricbeat-nginx-config
  namespace: monitoring
data:
  metricbeat.yml: |
    metricbeat.modules:
      - module: nginx
        metricsets:
          - stubstatus
        period: 10s
        hosts:
          - "http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:10254"
        server_status_path: "/metrics"
        enabled: true

    output.elasticsearch:
      hosts: ["https://quickstart-es-http.default.svc.cluster.local:9200"]
      username: "elastic"
      password: "${ELASTICSEARCH_PASSWORD}"
      ssl.verification_mode: none
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metricbeat-nginx
  namespace: monitoring
  labels:
    app: metricbeat-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metricbeat-nginx
  template:
    metadata:
      labels:
        app: metricbeat-nginx
    spec:
      serviceAccountName: elastic-agent
      containers:
        - name: metricbeat
          image: docker.elastic.co/beats/metricbeat:8.12.0
          args:
            - "-c"
            - "/etc/metricbeat.yml"
            - "-e"
          env:
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: quickstart-es-elastic-user
                  key: elastic
          resources:
            limits:
              memory: 100Mi
            requests:
              cpu: 50m
              memory: 50Mi
          volumeMounts:
            - name: config
              mountPath: /etc/metricbeat.yml
              subPath: metricbeat.yml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: metricbeat-nginx-config
