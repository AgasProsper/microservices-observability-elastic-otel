apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
# Standalone Elastic Agent as a DaemonSet
# Bypasses Fleet — sends metrics/logs directly to Elasticsearch via env vars
# Covers: host metrics, Kubernetes state, container logs
apiVersion: v1
kind: ConfigMap
metadata:
  name: elastic-agent-config
  namespace: monitoring
data:
  elastic-agent.yml: |
    outputs:
      default:
        type: elasticsearch
        hosts:
          - https://quickstart-es-http.default.svc.cluster.local:9200
        username: elastic
        password: "${ELASTICSEARCH_PASSWORD}"
        ssl.verification_mode: none

    inputs:
      - id: kubernetes-cluster-metrics
        type: kubernetes/metrics
        streams:
          - metricsets: [node, pod, container, namespace, deployment, daemonset, statefulset, persistentvolume, persistentvolumeclaim, service, cronjob, job]
            period: 10s

      - id: system-metrics
        type: system/metrics
        streams:
          - metricsets: [cpu, memory, network, diskio, load, filesystem, process, process_summary]
            period: 10s

      - id: kubernetes-container-logs
        type: filestream
        paths:
          - /var/log/containers/*.log
        processors:
          - add_kubernetes_metadata:
              host: "${NODE_NAME}"
              matchers:
                - logs_path:
                    logs_path: /var/log/containers/
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: elastic-agent
  namespace: monitoring
  labels:
    app: elastic-agent
spec:
  selector:
    matchLabels:
      app: elastic-agent
  template:
    metadata:
      labels:
        app: elastic-agent
    spec:
      serviceAccountName: elastic-agent
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - effect: NoSchedule
          operator: Exists
      containers:
        - name: elastic-agent
          image: docker.elastic.co/beats/elastic-agent:8.12.0
          args: ["-e", "-c", "/etc/elastic-agent/elastic-agent.yml"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elastic-agent-es-secret
                  key: password
          securityContext:
            runAsUser: 0
          resources:
            limits:
              memory: 500Mi
            requests:
              cpu: 100m
              memory: 200Mi
          volumeMounts:
            - name: config
              mountPath: /etc/elastic-agent
            - name: proc
              mountPath: /hostfs/proc
              readOnly: true
            - name: cgroup
              mountPath: /hostfs/sys/fs/cgroup
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: etcmachineid
              mountPath: /etc/machine-id
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: elastic-agent-config
        - name: proc
          hostPath:
            path: /proc
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: varlog
          hostPath:
            path: /var/log
        - name: etcmachineid
          hostPath:
            path: /etc/machine-id
            type: File
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: elastic-agent
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: elastic-agent
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - pods
      - services
      - endpoints
      - events
      - persistentvolumes
      - persistentvolumeclaims
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - replicasets
      - deployments
      - daemonsets
      - statefulsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: [jobs, cronjobs]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: elastic-agent
subjects:
  - kind: ServiceAccount
    name: elastic-agent
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: elastic-agent
  apiGroup: rbac.authorization.k8s.io
