spec:
  template:
    spec:
      containers:
      - name: server
        resources:
          limits:
            memory: 256Mi
        livenessProbe:
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
        readinessProbe:
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
